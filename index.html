<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pendidikan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f4f4f4;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      background: #34495e;
    }
    nav a {
      color: #fff;
      padding: 14px 20px;
      text-decoration: none;
    }
    nav a:hover {
      background: #1abc9c;
    }
    .hero {
      text-align: center;
      padding: 50px 20px;
      background: #ecf0f1;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    footer {
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Selamat Datang di Dashboard Pendidikan</h1>
    <p>Portal untuk guru, siswa, dan orang tua</p>
  </header>

  <nav>
    <a href="#login">Login</a>
    <a href="#daftar">Daftar</a>
    <a href="#fitur">Fitur Dashboard</a>
  </nav>

  <section class="hero">
    <h2>Belajar Lebih Mudah, Terstruktur, dan Terintegrasi</h2>
    <p>Akses semua jenjang pendidikan dalam satu dashboard.</p>
  </section>

  <section id="fitur" class="features">
    <div class="card">TK</div>
    <div class="card">SD</div>
    <div class="card">MI</div>
    <div class="card">SMP</div>
    <div class="card">MTs</div>
    <div class="card">SMA</div>
    <div class="card">MA</div>
  </section>

  <footer>
    <p>&copy; 2026 SDN 139 Lamanda - Dashboard Pendidikan</p>
  </footer>

</body>
  </html>
